name: Gradle Package

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Download missing Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        gradle wrapper
        chmod +x gradlew

    - name: Cache Local Maven Repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/spigotmc
        key: ${{ runner.os }}-spigot-buildtools-${{ hashFiles('.github/workflows/*.yml') }}
        restore-keys: |
          ${{ runner.os }}-spigot-buildtools-

    - name: Run BuildTools for all required versions
      run: |
        mkdir -p buildtools
        cd buildtools
        curl -o BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
        
        declare -A VERSIONS
        VERSIONS["v1_19_3"]="1.19.4"
        VERSIONS["v1_20_1"]="1.20.1"
        VERSIONS["v1_20_2"]="1.20.2"
        VERSIONS["v1_20_3"]="1.20.4"
        VERSIONS["v1_20_4"]="1.20.4"
        VERSIONS["v1_21_1"]="1.21"
        VERSIONS["v1_21_2"]="1.21.1"
        VERSIONS["v1_21_3"]="1.21.3"
        VERSIONS["v1_21_4"]="1.21.4"
        VERSIONS["v1_21_5"]="1.21.4"
        VERSIONS["v1_21_6"]="1.21.4"
        VERSIONS["v1_21_7"]="1.21.4"
        VERSIONS["v26"]="1.21.4"

        UNIQUE_VERSIONS=$(echo "${VERSIONS[@]}" | tr ' ' '\n' | sort -u)

        for v in $UNIQUE_VERSIONS; do
          JAR_PATH="$HOME/.m2/repository/org/spigotmc/spigot/$v-R0.1-SNAPSHOT/spigot-$v-R0.1-SNAPSHOT-remapped-mojang.jar"
          
          echo "========================================="
          if [ -f "$JAR_PATH" ]; then
            echo "Spigot version $v (remapped-mojang) found in cache. Skipping BuildTools."
          else
            echo "Spigot version $v not found in cache. Running BuildTools with Java 17..."
            $JAVA_HOME_17_X64/bin/java -jar BuildTools.jar --rev "$v" --remapped
          fi
          echo "========================================="
        done

    - name: Build with Gradle
      run: ./gradlew :dist:shadowJar

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: shadow-jar
        path: dist/build/libs/*.jar
        
